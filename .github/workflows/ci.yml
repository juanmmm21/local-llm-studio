#
# Integración continua: compila la app y ejecuta la suite de tests
# en cada push y pull request sobre main.
#
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Compilar y testear (macOS)
    runs-on: macos-15

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Versión de Xcode
        run: xcodebuild -version

      - name: Compilar
        run: |
          xcodebuild -scheme local-llm-studio \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            build

      - name: Ejecutar tests
        run: |
          xcodebuild -scheme local-llm-studio \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            test
